<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>

  <!-- Círculos de mira -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.35"/>
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <circle cx="16" cy="16" r="3.5" fill="url(#fg)"/>

  <!-- Líneas de mira -->
  <line x1="16" y1="2"  x2="16" y2="7"  stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="16" y1="25" x2="16" y2="30" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="2"  y1="16" x2="7"  y2="16" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="25" y1="16" x2="30" y2="16" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Punto central -->
